[phases.setup]
nixPkgs = ["nodejs_22", "chromium"]

[phases.install]
cmds = ["npm install -g pnpm", "pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm --filter @ofertasas/db run generate", "pnpm --filter @ofertasas/api run build"]

[start]
cmd = "node apps/api/dist/index.js"

[variables]
NODE_ENV = "production"
PLAYWRIGHT_BROWSERS_PATH = "/usr/local/lib/playwright"
